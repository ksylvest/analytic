require:
  - rubocop-rake
  - rubocop-rspec
  - rubocop-rails
  - rubocop-rspec_rails

AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  Exclude:
    - spec/dummy/**/*

Lint/EmptyBlock:
  Enabled: false

Style/Documentation:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/ParameterLists:
  Enabled: false
